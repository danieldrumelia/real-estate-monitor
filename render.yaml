services:
  - type: cron
    name: real-estate-monitor-market-report
    runtime: docker
    plan: standard
    schedule: "12 10 * * *"
    dockerCommand: real-estate-monitor scheduled-scrape
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: real-estate-monitor-db
          property: connectionString
      - key: REPORT_DIR
        value: reports
      - key: LOG_LEVEL
        value: INFO
      - key: SCRAPER_HEADLESS
        value: "true"
      - key: SCRAPER_TIMEOUT_MS
        value: "30000"
      - key: SCRAPER_MAX_PAGES
        value: "0"
      - key: SCRAPER_RETRIES
        value: "3"
      - key: SCRAPER_MIN_LISTING_RATIO
        value: "0.85"
      - key: EMAIL_ENABLED
        value: "true"
      - key: EMAIL_SMTP_HOST
        value: smtp.office365.com
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_USE_TLS
        value: "true"

databases:
  - name: real-estate-monitor-db
    plan: basic-256mb
